<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Midnight Space</title>
  <link rel="preload" as="fetch" href="./model.glb" crossorigin="anonymous" />
  <script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
  <style>
    :root {
      --bg: #06040a;
      --ink: #f4f0ff;
      --muted: #8a86a6;
      --accent: #a78bfa;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body { min-height: 100vh; overflow-x: hidden; }

    .hero {
      position: relative;
      min-height: 100vh;
      width: 100%;
      overflow: hidden;
      isolation: isolate;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(60% 50% at 50% 55%, rgba(167, 139, 250, 0.18), transparent 70%),
        radial-gradient(40% 35% at 50% 50%, rgba(80, 50, 200, 0.22), transparent 75%);
      filter: blur(10px);
      z-index: 0;
      pointer-events: none;
    }

    .stars {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 12% 20%, rgba(255,255,255,0.7), transparent 60%),
        radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,0.5), transparent 60%),
        radial-gradient(1.5px 1.5px at 30% 70%, rgba(255,255,255,0.6), transparent 60%),
        radial-gradient(1px 1px at 65% 60%, rgba(255,255,255,0.4), transparent 60%),
        radial-gradient(1px 1px at 90% 85%, rgba(255,255,255,0.55), transparent 60%),
        radial-gradient(1px 1px at 22% 90%, rgba(255,255,255,0.45), transparent 60%),
        radial-gradient(1.5px 1.5px at 50% 30%, rgba(255,255,255,0.5), transparent 60%);
    }

    nav.top {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px clamp(20px, 5vw, 64px);
    }
    nav .brand {
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 13px;
      color: var(--ink);
    }
    nav .brand .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      margin-right: 10px;
      vertical-align: middle;
    }
    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      gap: 28px;
    }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.08em;
      transition: color 160ms ease;
    }
    nav a:hover { color: var(--ink); }

    .stage {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: grid;
      place-items: center;
    }

    model-viewer {
      width: min(92vw, 900px);
      height: min(80vh, 720px);
      background: transparent;
      --poster-color: transparent;
      outline: none;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: clamp(40px, 10vh, 120px) 24px 0;
      pointer-events: none;
    }
    .content > * { pointer-events: auto; }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 18px;
      opacity: 0.9;
    }
    h1.title {
      margin: 0;
      font-size: clamp(48px, 9vw, 120px);
      line-height: 0.95;
      letter-spacing: -0.02em;
      font-weight: 700;
      background: linear-gradient(180deg, #ffffff 0%, #b9aef0 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 60px rgba(167, 139, 250, 0.25);
    }
    p.tagline {
      max-width: 540px;
      margin: 22px auto 0;
      font-size: clamp(15px, 1.6vw, 18px);
      line-height: 1.6;
      color: var(--muted);
    }

    .cta {
      margin-top: 36px;
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 22px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: 0.04em;
      text-decoration: none;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }
    .btn.primary {
      background: var(--ink);
      color: #0a0612;
      font-weight: 600;
    }
    .btn.primary:hover { transform: translateY(-1px); }
    .btn.ghost {
      color: var(--ink);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }
    .btn.ghost:hover { border-color: rgba(255, 255, 255, 0.42); }

    .scroll-hint {
      position: absolute;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      opacity: 0.7;
    }
    .scroll-hint::after {
      content: "";
      display: block;
      width: 1px;
      height: 28px;
      margin: 10px auto 0;
      background: linear-gradient(180deg, var(--muted), transparent);
    }

    .credit {
      position: fixed;
      right: 14px;
      bottom: 10px;
      z-index: 5;
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.06em;
    }
    .credit a { color: inherit; text-decoration: none; }
    .credit a:hover { color: rgba(255,255,255,0.7); }

    @media (max-width: 640px) {
      nav ul { display: none; }
      model-viewer { height: 70vh; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="stars" aria-hidden="true"></div>

    <nav class="top">
      <div class="brand"><span class="dot"></span>Midnight Space</div>
      <ul>
        <li><a href="#work">Work</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>

    <div class="stage" aria-hidden="true">
      <model-viewer
        src="./models/model.glb"
        alt="Animated cycle model"
        autoplay
        camera-controls
        disable-zoom
        interaction-prompt="none"
        camera-orbit="0deg 75deg 4.5m"
        field-of-view="30deg"
        exposure="1.4"
        shadow-intensity="0.8"
        tone-mapping="commerce"
        environment-image="https://modelviewer.dev/shared-assets/environments/neutral.hdr"
      ></model-viewer>
    </div>

    <div class="content">
      <p class="eyebrow">A creative studio in orbit</p>
      <h1 class="title">Midnight<br/>Space</h1>
      <p class="tagline">We design quiet interfaces and loud ideas — building digital products that feel alive after dark.</p>
      <div class="cta">
        <a class="btn primary" href="#work">View work</a>
        <a class="btn ghost" href="#contact">Get in touch</a>
      </div>
    </div>

    <div class="scroll-hint">Scroll</div>
  </section>

  <div class="credit">
    Model: "Cycle" by <a href="https://sketchfab.com/tamminen" target="_blank" rel="noopener">tamminen</a> · CC-BY-4.0
  </div>
</body>
</html>
