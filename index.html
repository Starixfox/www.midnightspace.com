<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Midnight Space</title>
  <style>
    html {
      background: #06040a;
    }
    html, body {
      margin: 0;
      padding: 0;
      color: #fff;
      font-family: Inter, system-ui, sans-serif;
    }
    body {
      min-height: 400vh;
      background: transparent;
    }
    .backdrop {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
      z-index: 0;
    }
    .badge-cover {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 220px;
      height: 80px;
      background: #06040a;
      z-index: 2;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <iframe
    class="backdrop"
    src="https://ready-ioajpahyp.peachworlds.com/"
    title="3D scene"
    allow="autoplay; xr-spatial-tracking"
    loading="eager"
  ></iframe>
  <div class="badge-cover" aria-hidden="true"></div>
</body>
</html>
