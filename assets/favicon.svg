<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Midnight Space mark: deep-space disc with a single cyan glow dot.
       The dot is a stand-in for "live data," not decoration. -->
  <defs>
    <radialGradient id="g" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1a3344"/>
      <stop offset="60%" stop-color="#08172a"/>
      <stop offset="100%" stop-color="#050a18"/>
    </radialGradient>
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7cd8e0" stop-opacity="1"/>
      <stop offset="60%" stop-color="#7cd8e0" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#7cd8e0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#g)"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#0b3a4a" stroke-width="1"/>
  <circle cx="44" cy="22" r="8" fill="url(#dot)"/>
  <circle cx="44" cy="22" r="2.4" fill="#7cd8e0"/>
</svg>
