<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>OG Source — Midnight Space</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..800,0..100;1,9..144,300..800,0..100&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* Renders at 1200×630. Headless puppeteer screenshots #card. */
    html, body { margin: 0; padding: 0; background: #fff; font-family: 'Inter', sans-serif; }
    #card {
      width: 1200px; height: 630px;
      position: relative; overflow: hidden;
      color: #fff;
      isolation: isolate;
      background:
        radial-gradient(60% 70% at 18% 22%, rgba(11,58,74,.65) 0%, transparent 70%),
        radial-gradient(60% 50% at 85% 80%, rgba(124,216,224,.18) 0%, transparent 65%),
        radial-gradient(45% 50% at 65% 18%, rgba(184,137,90,.13) 0%, transparent 60%),
        linear-gradient(160deg, #050a18 0%, #08172a 60%, #0a1f33 100%);
    }
    .stars {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 8% 18%, rgba(255,255,255,.85), transparent 60%),
        radial-gradient(1.8px 1.8px at 92% 12%, rgba(255,255,255,.78), transparent 60%),
        radial-gradient(1.2px 1.2px at 22% 78%, rgba(255,255,255,.7), transparent 60%),
        radial-gradient(1.6px 1.6px at 68% 64%, rgba(255,255,255,.6), transparent 60%),
        radial-gradient(1.2px 1.2px at 88% 88%, rgba(255,255,255,.65), transparent 60%),
        radial-gradient(1.4px 1.4px at 32% 22%, rgba(255,255,255,.55), transparent 60%),
        radial-gradient(1.8px 1.8px at 52% 36%, rgba(255,255,255,.6), transparent 60%),
        radial-gradient(1.2px 1.2px at 78% 28%, rgba(255,255,255,.55), transparent 60%),
        radial-gradient(1.4px 1.4px at 12% 56%, rgba(255,255,255,.55), transparent 60%),
        radial-gradient(1.6px 1.6px at 42% 88%, rgba(255,255,255,.5), transparent 60%);
    }
    .lockup {
      position: relative; z-index: 2;
      padding: 72px 88px;
      height: 100%;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .top { display: flex; justify-content: space-between; align-items: flex-start; }
    .stamp {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px; letter-spacing: .26em; text-transform: uppercase;
      color: #7cd8e0;
      display: inline-flex; align-items: center; gap: 14px;
    }
    .stamp .dot {
      width: 11px; height: 11px; border-radius: 50%;
      background: #7cd8e0;
      box-shadow: 0 0 22px rgba(124,216,224,.7);
    }
    .brand {
      display: flex; flex-direction: column; align-items: flex-end;
      line-height: 1;
    }
    .brand .top-w {
      font-family: 'Fraunces', serif;
      font-variation-settings: "opsz" 96, "SOFT" 30;
      font-weight: 400;
      font-size: 18px;
      letter-spacing: .32em;
      text-transform: uppercase;
      color: rgba(255,255,255,.85);
      margin-bottom: 8px;
    }
    .brand .bottom-w {
      font-family: 'Fraunces', serif;
      font-variation-settings: "opsz" 144, "SOFT" 30;
      font-weight: 400;
      font-size: 44px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #fff;
    }
    h1 {
      font-family: 'Fraunces', serif;
      font-variation-settings: "opsz" 144, "SOFT" 40;
      font-weight: 400;
      font-size: 120px;
      line-height: .96;
      letter-spacing: -.025em;
      margin: 0;
      color: #fff;
      max-width: 1024px;
    }
    h1 em {
      font-style: italic;
      font-variation-settings: "opsz" 144, "SOFT" 100;
      color: #7cd8e0;
    }
    .foot {
      display: flex; justify-content: space-between; align-items: flex-end;
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px; letter-spacing: .22em; text-transform: uppercase;
      color: rgba(255,255,255,.65);
    }
    .foot .right { text-align: right; }
    .foot strong { color: #fff; font-weight: 600; }
  </style>
</head>
<body>
  <div id="card">
    <div class="stars"></div>
    <div class="lockup">
      <div class="top">
        <span class="stamp"><span class="dot"></span>A space-data platform · Live</span>
        <div class="brand">
          <span class="top-w">Visit</span>
          <span class="bottom-w">Midnight Space</span>
        </div>
      </div>
      <h1>The space-funding<br/><em>landscape, live.</em></h1>
      <div class="foot">
        <span><strong>881</strong> programs · Saudi Arabia &nbsp;·&nbsp; <strong>564</strong> open right now</span>
        <span class="right">midnightspace<br/>.com</span>
      </div>
    </div>
  </div>
</body>
</html>
